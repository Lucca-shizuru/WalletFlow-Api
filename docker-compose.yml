version: '3.8'

services:
  db:
    image: postgres:latest
    container_name: walletflow-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: walletflow
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: walletflow-mq
    ports:
      - "5672:5672"   
      - "15672:15672" 